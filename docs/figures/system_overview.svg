<svg xmlns="http://www.w3.org/2000/svg" width="920" height="320" viewBox="0 0 920 320">
  <rect width="920" height="320" fill="#f4f1ea"/>
  <rect x="40" y="40" width="180" height="110" rx="12" fill="#d9e7ff" stroke="#204060" stroke-width="2"/>
  <text x="130" y="82" font-family="Helvetica, Arial, sans-serif" font-size="22" text-anchor="middle" fill="#102a43">PS</text>
  <text x="130" y="112" font-family="Helvetica, Arial, sans-serif" font-size="16" text-anchor="middle" fill="#102a43">ARM + DDR</text>
  <text x="130" y="136" font-family="Helvetica, Arial, sans-serif" font-size="16" text-anchor="middle" fill="#102a43">Python control</text>

  <rect x="300" y="40" width="220" height="110" rx="12" fill="#fff0cc" stroke="#7b5b00" stroke-width="2"/>
  <text x="410" y="82" font-family="Helvetica, Arial, sans-serif" font-size="22" text-anchor="middle" fill="#5a4100">AXI4-Lite</text>
  <text x="410" y="112" font-family="Helvetica, Arial, sans-serif" font-size="16" text-anchor="middle" fill="#5a4100">control path</text>
  <text x="410" y="136" font-family="Helvetica, Arial, sans-serif" font-size="16" text-anchor="middle" fill="#5a4100">register writes and reads</text>

  <rect x="600" y="40" width="260" height="110" rx="12" fill="#dff7e2" stroke="#1f5f2c" stroke-width="2"/>
  <text x="730" y="82" font-family="Helvetica, Arial, sans-serif" font-size="22" text-anchor="middle" fill="#1f5f2c">Booth Multiplier</text>
  <text x="730" y="112" font-family="Helvetica, Arial, sans-serif" font-size="16" text-anchor="middle" fill="#1f5f2c">AXI4-Lite IP</text>
  <text x="730" y="136" font-family="Helvetica, Arial, sans-serif" font-size="16" text-anchor="middle" fill="#1f5f2c">32-bit operands, 64-bit result</text>

  <rect x="300" y="200" width="220" height="90" rx="12" fill="#fce0d5" stroke="#8a3d1c" stroke-width="2"/>
