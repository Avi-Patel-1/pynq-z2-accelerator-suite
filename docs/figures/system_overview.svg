  <text x="410" y="262" font-family="Helvetica, Arial, sans-serif" font-size="16" text-anchor="middle" fill="#8a3d1c">MM2S / S2MM</text>

  <rect x="600" y="190" width="260" height="110" rx="12" fill="#efe1ff" stroke="#52307c" stroke-width="2"/>
  <text x="730" y="228" font-family="Helvetica, Arial, sans-serif" font-size="22" text-anchor="middle" fill="#52307c">3x3 Stream Filter</text>
  <text x="730" y="256" font-family="Helvetica, Arial, sans-serif" font-size="16" text-anchor="middle" fill="#52307c">AXI4-Stream in / out</text>
  <text x="730" y="280" font-family="Helvetica, Arial, sans-serif" font-size="16" text-anchor="middle" fill="#52307c">Sobel, blur, sharpen</text>

  <line x1="220" y1="95" x2="300" y2="95" stroke="#333" stroke-width="3"/>
  <line x1="520" y1="95" x2="600" y2="95" stroke="#333" stroke-width="3"/>
  <line x1="220" y1="245" x2="300" y2="245" stroke="#333" stroke-width="3"/>
  <line x1="520" y1="245" x2="600" y2="245" stroke="#333" stroke-width="3"/>
  <line x1="130" y1="150" x2="130" y2="245" stroke="#333" stroke-width="3"/>
