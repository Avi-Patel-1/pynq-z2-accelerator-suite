  <text x="560" y="82" font-family="Helvetica, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">control</text>
  <text x="250" y="232" font-family="Helvetica, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">DDR frames</text>
  <text x="560" y="232" font-family="Helvetica, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">stream path</text>
